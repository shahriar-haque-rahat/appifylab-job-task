# Local development infrastructure for the Appifylab job task.
# Brings up Postgres (primary DB) and Redis (refresh-token store + rate limiter + feed cache).
#
#   docker compose up -d          # start Postgres + Redis in the background
#   docker compose down           # stop
#   docker compose down -v        # stop AND wipe data volumes
#
# The backend reads these via DATABASE_URL / REDIS_URL in backend/.env
# (see backend/.env.example). For a hosted setup use Neon + Upstash instead
# and just point those two vars at the hosted connection strings — no code changes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: appifylab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appifylab
      POSTGRES_PASSWORD: appifylab
      POSTGRES_DB: appifylab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appifylab -d appifylab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: appifylab_redis
    restart: unless-stopped
    # Enable keyspace persistence so refresh tokens survive a container restart in dev.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
